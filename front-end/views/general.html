

<!-- Tabla de datos (Se expande automáticamente) -->
<div class="flex-grow min-h-0 overflow-hidden">
    
    <!-- Botón para alternar el panel -->
    <button ng-click="isPanelOpen = !isPanelOpen" class="mb-4 text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1 rounded border border-slate-700">
        {{ isPanelOpen ? '▲ Ocultar Panel' : '▼ Mostrar Panel' }}
    </button>

    <!-- Panel Lateral Colapsable ahora en posición superior -->
<div ng-show="isPanelOpen" class="w-full bg-slate-950 border-b border-slate-800 p-4 transition-all duration-300">
    <ul>
        <li ng-repeat="item in filteredTableRows| filter:searchText">
            {{item.ip}}:{{item.port}}
        </li>
    </ul> 
    

</div>


    <div class="overflow-x-auto max-h-[600px] border border-slate-800 rounded-lg">
        <table class="w-full text-left text-xs text-slate-300">
            <thead class="bg-slate-950 text-[10px] text-slate-400 uppercase tracking-wider sticky top-0 border-b border-slate-800">
                <tr>
                    <th class="py-3 px-5">Estado</th>
                    <th class="py-3 px-5">Host IP</th>
                    <th class="py-3 px-5">Plataforma / OS</th>
                    <th class="py-3 px-5 text-center">Puerto</th>
                    <th class="py-3 px-5">Servicio</th>
                    <th class="py-3 px-5">Versión y Producto</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-700/60">
                <tr ng-repeat="row in filteredTableRows | filter:searchText" class="hover:bg-slate-800/40 transition-colors">
                    <td class="py-3.5 px-5">
                        <button ng-click="updateprop($event,'discovered',row)" class="w-12 h-6 rounded-full p-1 transition-all flex items-center border border-slate-900/50">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" ng-class="{'discovered-color':row.discovered,'cyan-color':!row.discovered}" style="width: 20px;">
                                <path fill-rule="evenodd" d="M6.32 2.577a49.255 49.255 0 0 1 11.36 0c1.497.174 2.57 1.46 2.57 2.93V21a.75.75 0 0 1-1.085.67L12 18.089l-7.165 3.583A.75.75 0 0 1 3.75 21V5.507c0-1.47 1.073-2.756 2.57-2.93Z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </td>
                    <td class="py-3.5 px-5 font-mono">{{ row.ip }}</td>
                    <td class="py-3.5 px-5">{{ row.os }}</td>
                    <td class="py-3.5 px-5 text-center">{{ row.port }}</td>
                    <td class="py-3.5 px-5">
                        <input type="text" ng-model="row.service_name" class="bg-slate-950 border border-slate-800 rounded px-2 py-1 w-full" />
                    </td>
                    <td class="py-3.5 px-5">
                        <input type="text" ng-model="row.product_version" class="bg-slate-950 border border-slate-800 rounded px-2 py-1 w-full" />
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
