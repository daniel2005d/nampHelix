 <div
 ng-repeat="cmd in nmap"
 class="bg-slate-900 rounded-lg shadow-xl overflow-hidden border border-slate-700">
      <div class="flex items-center px-4 py-2 bg-slate-800 border-b border-slate-700">
        <div class="flex space-x-2">
          <div class="w-3 h-3 rounded-full bg-red-500"></div>
          <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
          <div class="w-3 h-3 rounded-full bg-green-500"></div>
        </div>
        <span class="ml-4 text-xs text-slate-400 font-mono">terminal — scan_nmap</span>
      </div>
      <div class="p-4">
        <code class="text-emerald-400 font-mono text-sm break-all">
          {{cmd}}
        </code>
        <button 
        ng-click="copyCommand(cmd, $index)"
        ng-class="copied[$index] ? 'bg-emerald-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'"
        class="px-3 py-1 text-xs font-semibold rounded transition-all duration-200">
        {{copiado[$index] ? '✓ Copiado!' : 'Copiar'}}
      </button>
      </div>
    </div>
